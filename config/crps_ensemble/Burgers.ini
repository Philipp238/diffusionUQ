[META]
results_path = results/
data_path = data/
experiment_name = crps_ensemble_burgers

[TRAININGPARAMETERS]
report_every = 10
seed = [1,2,3,4,5]
model = 'UNet'
uncertainty_quantification = ['crps']
backbone = ["default"]
batch_size = [128]
eval_batch_size = [1024]
n_epochs = 5000
early_stopping = 50
learning_rate = 0.0005
alpha = 0.05
n_samples_uq = 100
### Model Parameters
dropout = [0.1]
hidden_dim = [64]
n_layers = [2]
### CRPS Ensemble Parameters
noise_dim = [10]
n_train_samples = [20]
evalaute = True

[DATAPARAMETERS]
dataset_name = ['1D_Burgers']
downscaling_factor = 4
standardize = True
select_timesteps = "random"
temporal_downscaling_factor = 2
